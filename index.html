<!DOCTYPE html>
<html>
<head>
<title>Free Credit Card Apply</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
.container { padding:20px; }
h1 { color:#00ffcc; }

.offer {
  background:#ff9800;
  padding:15px;
  border-radius:10px;
  color:black;
}

.timer { font-size:22px; color:#ff3d00; margin-top:10px; }

.live {
  background:#000;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

.box {
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

input {
  width:90%;
  padding:12px;
  margin:10px;
}

button {
  background:#00c853;
  color:white;
  padding:12px;
  width:95%;
  border:none;
}

.error { color:red; }
</style>
</head>

<body>

<div class="container">

<h1>💳 Free Credit Card Apply</h1>

<div class="offer">
🎁 ₹500 Cashback + Lifetime Free Card
</div>

<div class="timer">
⏳ Offer Ends In: <span id="countdown"></span>
</div>

<div class="live">
🔥 <span id="users"></span> people applying now
</div>

<div class="box">

<form id="leadForm" action="https://formspree.io/f/xnjowrzb" method="POST">

<input type="text" id="name" name="name" placeholder="Enter Name" required>

<input type="tel" id="mobile" name="mobile" placeholder="Enter Mobile Number" maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')" required>

<button type="submit">Apply Now</button>

</form>

<p class="error" id="error"></p>

</div>

</div>

<script>

// 🔥 GLOBAL START TIME (CHANGE ONLY THIS ONCE)
let globalStart = new Date("2026-01-01T00:00:00").getTime();

// ⏳ TIMER (SAME FOR ALL USERS)
let duration = 300; // 5 min

function updateTimer(){
  let now = new Date().getTime();

  let elapsed = Math.floor((now - globalStart) / 1000);
  let remaining = duration - (elapsed % duration);

  let m = Math.floor(remaining / 60);
  let s = remaining % 60;
  s = s < 10 ? "0" + s : s;

  document.getElementById("countdown").innerHTML = m + ":" + s;
}

setInterval(updateTimer,1000);

// 🔥 GLOBAL USERS (SAME FOR ALL USERS)
// every 20 min +1, max 30
function updateUsers(){
  let now = new Date().getTime();

  let diff = now - globalStart;

  let increase = Math.floor(diff / 1200000); // 20 min

  let users = 5 + increase;

  if(users > 30) users = 30;

  document.getElementById("users").innerHTML = users;
}

setInterval(updateUsers,1000);

// INITIAL CALL
updateTimer();
updateUsers();


// ✅ FORM
document.getElementById("leadForm").addEventListener("submit",function(e){
  let name = document.getElementById("name").value.trim();
  let mobile = document.getElementById("mobile").value.trim();
  let error = document.getElementById("error");

  error.innerHTML="";

  if(!/^[A-Za-z ]+$/.test(name)){
    error.innerHTML="❌ Name invalid";
    e.preventDefault();
    return;
  }

  if(!/^[6-9][0-9]{9}$/.test(mobile)){
    error.innerHTML="❌ Invalid mobile";
    e.preventDefault();
    return;
  }

  setTimeout(()=>{
    window.location.href="YOUR_AFFILIATE_LINK";
  },2000);
});
</script>

</body>
</html>
